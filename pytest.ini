[pytest]
testpaths = skills grailzee-cowork/tests
pythonpath = skills/grailzee-eval grailzee-cowork grailzee-cowork/tests
markers =
    llm: slow LLM integration tests — require Anthropic API access (run via make test-llm)
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# importlib mode: gives each `tests/` package (grailzee-eval + grailzee-cowork)
# an isolated module identity so same-named packages don't collide on sys.modules.
addopts = --import-mode=importlib
